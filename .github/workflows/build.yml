name: Build And Package PyQt Blog Client

on:
  # 推送到 main 分支时自动构建
  push:
    branches:
      - main
    # 推送版本标签（如 v1.0.0）时触发构建并发布 Release
    tags:
      - 'v*'

# 关键权限：发布 Release 需要 contents: write，避免 403 权限错误
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform_name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - os: windows-latest
            platform_name: Windows x86_64
            package_file: Mozhu_Blog_Tool_Windows_x86.zip
            artifact_name: package-windows

          # macOS ARM64（Apple Silicon，M 系列芯片）
          - os: macos-14
            platform_name: macOS ARM64
            package_file: Mozhu_Blog_Tool_Mac_ARM64.zip
            artifact_name: package-macos

          # Linux amd64
          - os: ubuntu-22.04
            platform_name: Linux amd64
            package_file: Mozhu_Blog_Tool_Linux_amd64.AppImage
            artifact_name: package-linux

    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install pyqt6 gitpython mammoth html2text pyinstaller pillow

      - name: Generate app icon assets from SVG
        if: runner.os != 'Linux'
        run: |
          python - << 'PY'
          from pathlib import Path
          from PyQt6.QtCore import QRectF, Qt
          from PyQt6.QtGui import QImage, QPainter
          from PyQt6.QtSvg import QSvgRenderer
          from PIL import Image

          src = Path("assets/icons/mozu.svg")
          out_dir = Path("assets/icons")
          renderer = QSvgRenderer(str(src))
          if not renderer.isValid():
              raise SystemExit("SVG icon is invalid: assets/icons/mozu.svg")

          sizes = [16, 32, 48, 64, 128, 256, 512, 1024]
          png_files = []
          for size in sizes:
              img = QImage(size, size, QImage.Format.Format_ARGB32)
              img.fill(Qt.GlobalColor.transparent)
              painter = QPainter(img)
              renderer.render(painter, QRectF(0, 0, size, size))
              painter.end()
              png = out_dir / f"mozu-{size}.png"
              img.save(str(png))
              png_files.append(png)

          ico_base = Image.open(str(out_dir / "mozu-256.png"))
          ico_base.save(
              str(out_dir / "mozu.ico"),
              format="ICO",
              sizes=[(16, 16), (24, 24), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)],
          )
          PY

      - name: Build macOS .icns from generated PNGs
        if: runner.os == 'macOS'
        run: |
          rm -rf build/mozu.iconset
          mkdir -p build/mozu.iconset
          cp assets/icons/mozu-16.png build/mozu.iconset/icon_16x16.png
          cp assets/icons/mozu-32.png build/mozu.iconset/icon_16x16@2x.png
          cp assets/icons/mozu-32.png build/mozu.iconset/icon_32x32.png
          cp assets/icons/mozu-64.png build/mozu.iconset/icon_32x32@2x.png
          cp assets/icons/mozu-128.png build/mozu.iconset/icon_128x128.png
          cp assets/icons/mozu-256.png build/mozu.iconset/icon_128x128@2x.png
          cp assets/icons/mozu-256.png build/mozu.iconset/icon_256x256.png
          cp assets/icons/mozu-512.png build/mozu.iconset/icon_256x256@2x.png
          cp assets/icons/mozu-512.png build/mozu.iconset/icon_512x512.png
          cp assets/icons/mozu-1024.png build/mozu.iconset/icon_512x512@2x.png
          iconutil -c icns build/mozu.iconset -o assets/icons/mozu.icns

      - name: Create CI entry file (main.py)
        run: |
          cat > main.py << 'PY'
          import sys
          from PyQt6.QtWidgets import QApplication
          from pyqt_main_window import MainWindow

          if __name__ == "__main__":
              app = QApplication(sys.argv)
              window = MainWindow()
              window.show()
              sys.exit(app.exec())
          PY

      # Windows 平台：按要求使用 -F（--onefile）+ --windowed
      - name: Build with PyInstaller on Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller -F --windowed --name="墨筑博客工作台" --icon="assets/icons/mozu.ico" --add-data "assets;assets" main.py

      # macOS 平台：按要求使用 -F（--onefile）+ --windowed（输出 .app）
      - name: Build with PyInstaller on macOS
        if: runner.os == 'macOS'
        run: |
          pyinstaller -F --windowed --name="墨筑博客工作台" --icon="assets/icons/mozu.icns" --add-data "assets:assets" main.py

      # Linux 平台：使用 -F（--onefile）+ --windowed
      - name: Build with PyInstaller on Linux
        if: runner.os == 'Linux'
        run: |
          pyinstaller -F --windowed --name="墨筑博客工作台" --add-data "assets:assets" main.py

      # Windows 压缩：使用 PowerShell Compress-Archive
      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: .
        run: |
          Compress-Archive -Path "dist/墨筑博客工作台.exe" -DestinationPath "${{ matrix.package_file }}" -Force

      # macOS 压缩：使用 zip -r 打包 .app
      - name: Package macOS build
        if: runner.os == 'macOS'
        run: |
          zip -r "${{ matrix.package_file }}" "dist/墨筑博客工作台.app"

      # Linux AppImage 打包（amd64）
      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          cp "dist/墨筑博客工作台" "AppDir/usr/bin/墨筑博客工作台"
          chmod +x "AppDir/usr/bin/墨筑博客工作台"
          cp "assets/icons/mozu.svg" "AppDir/usr/share/icons/hicolor/scalable/apps/mozu-blog-tool.svg"

          cat > AppDir/AppRun << 'EOF'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/墨筑博客工作台" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/usr/share/applications/mozu-blog-tool.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=墨筑博客工作台
          Exec=AppRun
          Icon=mozu-blog-tool
          Categories=Utility;
          Terminal=false
          EOF

          cp "AppDir/usr/share/applications/mozu-blog-tool.desktop" "AppDir/mozu-blog-tool.desktop"
          cp "assets/icons/mozu.svg" "AppDir/mozu-blog-tool.svg"

          curl -L -o appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir "${{ matrix.package_file }}"

      # 上传每个平台构建产物，供后续 Release 作业合并上传
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_file }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    # 只有推送标签时才发布 Release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true
          path: release

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
