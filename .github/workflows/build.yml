name: Build And Package PyQt Blog Client

on:
  # 推送到 main 分支时自动构建
  push:
    branches:
      - main
    # 推送版本标签（如 v1.0.0）时触发构建并发布 Release
    tags:
      - 'v*'

# 关键权限：发布 Release 需要 contents: write，避免 403 权限错误
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform_name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - os: windows-latest
            platform_name: Windows x86_64
            zip_name: Mozhu_Blog_Tool_Windows_x86.zip
            artifact_name: package-windows

          # macOS ARM64（Apple Silicon，M 系列芯片）
          - os: macos-14
            platform_name: macOS ARM64
            zip_name: Mozhu_Blog_Tool_Mac_ARM64.zip
            artifact_name: package-macos

    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install pyqt6 gitpython mammoth html2text pyinstaller

      - name: Create CI entry file (main.py)
        run: |
          cat > main.py << 'PY'
          import sys
          from PyQt6.QtWidgets import QApplication
          from pyqt_main_window import MainWindow

          if __name__ == "__main__":
              app = QApplication(sys.argv)
              window = MainWindow()
              window.show()
              sys.exit(app.exec())
          PY

      # Windows 平台：按要求使用 --onedir + --windowed
      - name: Build with PyInstaller on Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onedir --windowed --name="墨筑博客工作台" main.py

      # macOS 平台：按要求使用 --windowed（输出 .app）
      - name: Build with PyInstaller on macOS
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --name="墨筑博客工作台" main.py

      # Windows 压缩：使用 PowerShell Compress-Archive
      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: .
        run: |
          Compress-Archive -Path "dist/墨筑博客工作台" -DestinationPath "${{ matrix.zip_name }}" -Force

      # macOS 压缩：使用 zip -r 打包 .app
      - name: Package macOS build
        if: runner.os == 'macOS'
        run: |
          zip -r "${{ matrix.zip_name }}" "dist/墨筑博客工作台.app"

      # 上传每个平台构建产物，供后续 Release 作业合并上传
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.zip_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    # 只有推送标签时才发布 Release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true
          path: release

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
